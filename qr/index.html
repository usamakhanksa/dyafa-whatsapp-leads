<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dyafa WhatsApp QR</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .card {
      width: min(720px, 92vw);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { line-height: 1.5; margin: 0 0 10px; }
    code {
      background: #eef2ff;
      color: #1e3a8a;
      padding: 2px 6px;
      border-radius: 6px;
    }
    label { display: block; margin-top: 12px; font-weight: 700; }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      margin-top: 6px;
      font-size: 1rem;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    a.btn {
      text-decoration: none;
      background: #25d366;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 700;
    }
    a.secondary { background: #111827; }
    .hint { font-size: 0.95rem; color: #4b5563; margin-top: 10px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>QR is on your Node backend (not GitHub Pages)</h1>
    <p>
      This URL is static. Your real QR runs on Express route
      <code>/qr</code> in <code>server.js</code>.
    </p>

    <label for="backend">Backend URL</label>
    <input id="backend" placeholder="https://your-backend.up.railway.app" />

    <label for="owner">Your WhatsApp number (country code + number)</label>
    <input id="owner" placeholder="966510451995" />

    <div class="actions">
      <a id="openBackend" class="btn" href="#">Open backend /qr</a>
      <a id="openTest" class="btn secondary" href="../test-chat.html">Open website test chat</a>
    </div>

    <p class="hint">
      Scan QR one time on backend. After that, website chat messages go to your WhatsApp number.
    </p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const backendInput = document.getElementById('backend');
    const ownerInput = document.getElementById('owner');
    const qrLink = document.getElementById('openBackend');
    const testLink = document.getElementById('openTest');

    backendInput.value = params.get('backend') || 'http://localhost:8080';
    ownerInput.value = params.get('to') || '';

    function refreshLinks() {
      const backend = backendInput.value.trim().replace(/\/$/, '');
      const owner = ownerInput.value.trim();
      qrLink.href = backend ? `${backend}/qr` : '#';
      qrLink.textContent = backend ? `Open ${backend}/qr` : 'Open backend /qr';

      const qp = new URLSearchParams();
      if (backend) qp.set('backend', backend);
      if (owner) qp.set('to', owner);
      testLink.href = `../test-chat.html${qp.toString() ? `?${qp}` : ''}`;
    }

    backendInput.addEventListener('input', refreshLinks);
    ownerInput.addEventListener('input', refreshLinks);
    refreshLinks();
  </script>
</body>
</html>
