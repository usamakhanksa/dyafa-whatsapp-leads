<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dyafa WhatsApp QR</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .card {
      width: min(680px, 92vw);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { line-height: 1.5; margin: 0 0 10px; }
    code {
      background: #eef2ff;
      color: #1e3a8a;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    a.btn {
      text-decoration: none;
      background: #25d366;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 700;
    }
    a.secondary { background: #111827; }
  </style>
</head>
<body>
  <main class="card">
    <h1>QR page moved to your backend server</h1>
    <p>
      This GitHub Pages site is static, so it cannot run the Node.js route
      <code>/qr</code> from <code>server.js</code>.
    </p>
    <p>
      Open your deployed backend URL instead (Railway/Render/etc.), then add
      <code>/qr</code>.
    </p>
    <div class="actions">
      <a id="openBackend" class="btn" href="#">Open backend /qr</a>
      <a class="btn secondary" href="../test-chat.html">Open test chat</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const backend = params.get('backend') || 'http://localhost:8080';
    const clean = backend.replace(/\/$/, '');
    const qrUrl = `${clean}/qr`;

    const link = document.getElementById('openBackend');
    link.href = qrUrl;
    link.textContent = `Open ${qrUrl}`;
  </script>
</body>
</html>
